<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陳情書一覧 | 令和ボイス</title>
    <style>
        :root {
            --main-bg: #0d0d0d;
            --text-color: #f2f2f2;
            --accent-red: #e60000;
            --accent-dark-red: #990000;
            --card-bg: #1a1a1a;
            --border-color: #333;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
            background-color: var(--main-bg);
            color: var(--text-color);
            line-height: 1.8;
        }

        /* ===== ナビゲーション ===== */
        header {
            background-color: #000; padding: 0 5%;
            border-bottom: 2px solid var(--accent-red);
            position: sticky; top: 0; z-index: 100;
        }
        .header-inner { display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .site-logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; color: #fff; text-decoration: none; }
        nav { display: flex; align-items: center; gap: 5px; }
        nav a { color: #ccc; text-decoration: none; padding: 8px 14px; border-radius: 4px; font-size: 0.9rem; transition: 0.2s; }
        nav a:hover { color: #fff; background: #1a1a1a; }
        nav a.active { color: var(--accent-red); border-bottom: 2px solid var(--accent-red); border-radius: 0; }
        .nav-cta { background: var(--accent-red) !important; color: #fff !important; font-weight: bold; border-radius: 4px !important; border-bottom: none !important; }
        .nav-cta:hover { background: var(--accent-dark-red) !important; }
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 5px; }
        .hamburger span { display: block; width: 22px; height: 2px; background: #fff; }

        /* ===== ページヘッダー ===== */
        .page-hero {
            padding: 60px 10%; text-align: center;
            background: linear-gradient(to bottom, #1a0000, #0d0d0d);
            border-bottom: 1px solid var(--border-color);
        }
        .page-hero h1 { font-size: 2.5rem; color: var(--accent-red); margin-bottom: 10px; }
        .page-hero p { color: #aaa; font-size: 1.1rem; }

        .container { max-width: 960px; margin: 0 auto; padding: 50px 20px; }

        /* ===== フィルターバー ===== */
        .filter-bar {
            display: flex; flex-wrap: wrap; gap: 10px;
            align-items: center; margin-bottom: 25px;
            padding: 20px; background: var(--card-bg);
            border: 1px solid var(--border-color); border-radius: 8px;
        }
        .filter-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; width: 100%; }
        .filter-label { color: #888; font-size: 0.82rem; min-width: 55px; }
        .filter-btn {
            background: #222; color: #ccc; border: 1px solid #444;
            padding: 6px 14px; border-radius: 20px; cursor: pointer;
            font-size: 0.82rem; transition: 0.2s;
        }
        .filter-btn.active, .filter-btn:hover { background: var(--accent-red); color: #fff; border-color: var(--accent-red); }
        .search-box {
            flex: 1; min-width: 200px;
            background: #111; border: 1px solid #444; color: #fff;
            padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; outline: none;
        }
        .search-box:focus { border-color: var(--accent-red); }
        .category-select {
            background: #222; color: #ccc; border: 1px solid #444;
            padding: 7px 12px; border-radius: 20px; font-size: 0.82rem;
            cursor: pointer; outline: none;
        }
        .category-select:focus { border-color: var(--accent-red); }

        /* ===== 件数表示 ===== */
        .list-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .list-meta .count { color: #888; font-size: 0.9rem; }
        .list-meta .count span { color: var(--accent-red); font-weight: bold; font-size: 1.1rem; }
        .reload-btn {
            background: transparent; border: 1px solid #444;
            color: #888; padding: 6px 14px; border-radius: 20px;
            cursor: pointer; font-size: 0.82rem; transition: 0.2s;
        }
        .reload-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }

        /* ===== ローディング ===== */
        .loading-state {
            text-align: center; padding: 80px 20px;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid #333;
            border-top-color: var(--accent-red); border-radius: 50%;

        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-state p { color: #666; }

        /* ===== エラー・空状態 ===== */
        .error-state, .empty-state {

        .status-募集中   { background: #1a1a00; color: #e6c000; border: 1px solid #e6c000; }

            border-top: 1px dashed #333; padding-top: 15px; margin-top: 5px;

        .petition-doc-btn {
            display: inline-flex; align-items: center; gap: 6px;

            color: #ccc; padding: 8px 18px; border-radius: 20px;

        .like-btn {
            background: transparent; border: 2px solid var(--accent-red);
            color: var(--accent-red); padding: 8px 20px; font-size: 1rem;

            display: flex; align-items: center; gap: 8px; transition: 0.2s;

        .like-btn.clicked { cursor: default; }

        /* ===== ページネーション ===== */

            background: #222; color: #ccc; border: 1px solid #444;
            padding: 8px 16px; border-radius: 4px; cursor: pointer;
            font-size: 0.9rem; transition: 0.2s; min-width: 40px;

        /* ===== シェアボタン ===== */
        .share-area { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

        .share-btn:hover { border-color: #888; color: #fff; }

        /* ===== 注意バナー ===== */
        .publish-notice {
            background: #1a1500; border: 1px solid #554400;

        }
        footer a { color: #888; text-decoration: none; margin: 0 10px; }
        footer a:hover { color: #fff; }

        @media (max-width: 768px) {
            nav { display: none; flex-direction: column; position: absolute; top: 60px; left: 0; width: 100%; background: #000; padding: 20px; gap: 10px; border-bottom: 1px solid var(--border-color); }
            nav.open { display: flex; }

            .page-hero h1 { font-size: 1.8rem; }
            .petition-card { padding: 18px; }
            .card-meta { flex-direction: column; gap: 4px; }
        }
    </style>

<script>
// =====================================================================
// 設定
// =====================================================================
// ▼ Googleスプレッドシート「ウェブに公開」で発行したCSV URL
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQpmRYjyz365eM2kyhPenekUNsQSNF_0o7tDnBve_K7djXMs7WQocFWhjLSfysuFdY3Bp0tKhh0tK2y/pub?gid=1599355687&single=true&output=csv';

// ▼ GAS デプロイ後にURLを貼り付ける（reiwavoice_api.gs をデプロイして取得）
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzl9Qt83DpHWsE6QaUY6VCuofFsoABP33d6Bq-7uCSGoEnOjxnyKN4paQNH0oA9t7Nn6w/exec';

const PER_PAGE  = 10; // 1ページあたりの表示件数

// 列インデックス（0始まり） ← スプレッドシートの列構成に基づく
const COL = {
    timestamp    : 0,
    prefecture   : 1,   // 都道府県
    municipality : 2,   // 市区町村
    ageGroup     : 3,   // 年代
    gender       : 4,   // 性別
    category     : 5,   // カテゴリ（公開用シートH列→5番目）
    status       : 6,   // ステータス（公開用シートL列→6番目）
    petitionUrl  : 7,   // 陳情書URL（公開用シートM列→7番目）
    likeCount    : 8,   // 賛同数（公開用シートO列→8番目）
    title        : 9,   // AIタイトル（公開用シートP列→9番目）
};

// =====================================================================
// 状態管理
// =====================================================================
let allPetitions  = [];
let filteredData  = [];
let currentPage   = 1;
let likedSet      = new Set(JSON.parse(localStorage.getItem('liked') || '[]'));
let activeFilters = { status: 'all', prefecture: 'all', category: 'all', keyword: '' };

// =====================================================================
// データ取得（CSV版）
// =====================================================================
async function loadData() {
    document.getElementById('petition-list').innerHTML = `
        <div class="loading-state">
            <div class="spinner"></div>
            <p>Googleスプレッドシートからデータを読み込んでいます…</p>
        </div>`;
    document.getElementById('pagination').innerHTML = '';
    document.getElementById('shown-count').textContent = '－';
    document.getElementById('publish-notice').style.display = 'none';

    try {
        const res = await fetch(SHEET_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();

        const rows = parseCSV(text);
        allPetitions = rowsToObjects(rows);
        populateFilterSelects();
        applyFilters();

    } catch (err) {
        console.error(err);
        showError(err.message);
    }
}

// =====================================================================
// CSVパーサー（ダブルクォート・改行・カンマ含む値に対応）
// =====================================================================
function parseCSV(text) {
    const rows = [];
    let row = [], field = '', inQuotes = false;

    for (let i = 0; i < text.length; i++) {
        const ch = text[i], next = text[i + 1];
        if (inQuotes) {
            if (ch === '"' && next === '"') { field += '"'; i++; }
            else if (ch === '"')            { inQuotes = false; }
            else                            { field += ch; }
        } else {
            if      (ch === '"')                         { inQuotes = true; }
            else if (ch === ',')                         { row.push(field); field = ''; }
            else if (ch === '\n' || (ch === '\r' && next === '\n')) {
                if (ch === '\r') i++;
                row.push(field); rows.push(row); row = []; field = '';
            } else { field += ch; }
        }
    }
    if (field !== '' || row.length > 0) { row.push(field); rows.push(row); }
    return rows;
}

// =====================================================================
// CSV行配列 → オブジェクト配列（ヘッダー行をスキップ）
// =====================================================================
function rowsToObjects(rows) {
    if (!rows || rows.length < 2) return [];

    return rows.slice(1)
        .map((cols, sliceIdx) => {
            const get = (i) => (cols[i] !== undefined ? cols[i].trim() : '');
            return {
                id          : sliceIdx,
                sheetRowNum : sliceIdx + 2,      // スプレッドシートの実際の行番号（GAS用）
                timestamp   : get(COL.timestamp),
                prefecture  : get(COL.prefecture),
                municipality: get(COL.municipality),
                ageGroup    : get(COL.ageGroup),   // D列: 年代
                gender      : get(COL.gender),     // E列: 性別
                complaint   : get(COL.complaint),
                category    : get(COL.category),
                status      : get(COL.status),
                petitionUrl : get(COL.petitionUrl),
                likeCount   : parseInt(get(COL.likeCount)) || 0,  // O列: 賛同数
                title       : get(COL.title),                     // P列: AIタイトル
            };
        })
        .filter(p =>
            p.prefecture
            && p.prefecture !== 'Q1. お住まいの都道府県を選択してください'
            && (p.title || p.petitionUrl)
        );
}

// =====================================================================
// フィルター用セレクトボックスを動的生成
// =====================================================================
function populateFilterSelects() {
    const prefs      = [...new Set(allPetitions.map(p => p.prefecture).filter(Boolean))].sort();
    const categories = [...new Set(allPetitions.map(p => p.category).filter(Boolean))].sort();

    const prefSel = document.getElementById('pref-select');
    prefSel.innerHTML = '<option value="all">すべての都道府県</option>';
    prefs.forEach(p => prefSel.innerHTML += `<option value="${p}">${p}</option>`);

    const catSel = document.getElementById('category-select');
    catSel.innerHTML = '<option value="all">すべてのカテゴリ</option>';
    categories.forEach(c => catSel.innerHTML += `<option value="${c}">${c}</option>`);
}

// =====================================================================
// フィルタ適用
// =====================================================================
function applyFilters() {
    filteredData = allPetitions.filter(p => {
        const matchStatus = activeFilters.status === 'all'
            || (p.status && p.status.includes(activeFilters.status));

        const matchPref = activeFilters.prefecture === 'all'
            || p.prefecture === activeFilters.prefecture;

        const matchCat = activeFilters.category === 'all'
            || p.category === activeFilters.category;

        const kw = activeFilters.keyword.toLowerCase();
        const matchKw = !kw
            || (p.title || '').toLowerCase().includes(kw)
            || p.municipality.toLowerCase().includes(kw)
            || p.prefecture.toLowerCase().includes(kw)
            || p.category.toLowerCase().includes(kw);

        return matchStatus && matchPref && matchCat && matchKw;
    });

    currentPage = 1;
    document.getElementById('shown-count').textContent = filteredData.length;
    renderPage(currentPage);
    renderPagination();
}

// =====================================================================
// ページレンダリング
// =====================================================================
function renderPage(page) {
    const list  = document.getElementById('petition-list');
    const start = (page - 1) * PER_PAGE;
    const slice = filteredData.slice(start, start + PER_PAGE);

    if (slice.length === 0) {
        list.innerHTML = `
            <div class="empty-state">
                <div class="icon">🔍</div>
                <h3>該当する陳情書がありません</h3>
                <p>フィルターを変えるか、別のキーワードで検索してみてください。</p>
            </div>`;
        return;
    }

    list.innerHTML = slice.map(p => buildCard(p)).join('');
}

// =====================================================================
// カード HTML 生成
// =====================================================================
function buildCard(p) {
    const statusClass = getStatusClass(p.status);
    const statusLabel = p.status || '処理中';
    const title       = buildTitle(p);
    // AIタイトルがあればそれを表示、なければカテゴリベースの汎用表現にする（生の不満テキストは非表示）
    const summary     = p.title
        ? p.title
        : (p.category ? `【${p.category}】に関する市民の声` : '行政への陳情');

    const likeKey   = `petition_${p.id}`;
    const isLiked   = likedSet.has(likeKey);
    const likeCount = p.likeCount || 0;   // スプレッドシートの実数
    const likeLabel = isLiked ? '賛同済み ✓' : `🔥 賛同する`;

    const docBtn = (p.petitionUrl && (p.status === '送付準備' || p.status === '送付完了'))
        ? `<a href="${escHtml(p.petitionUrl)}" target="_blank" rel="noopener" class="petition-doc-btn">📄 陳情書全文を読む</a>`
        : `<span class="petition-doc-btn" style="opacity:0.4;cursor:default;">📄 ${p.petitionUrl ? '確認中…' : '生成中…'}</span>`;

    const ageGender = [p.ageGroup, p.gender].filter(Boolean).map(escHtml).join(' ／ ');
    const shareTitle = encodeURIComponent((p.title || '行政への陳情') + ' | 令和ボイス');
    const shareUrl = encodeURIComponent('https://r-voice.tech/petitions.html');

    return `
    <div class="petition-card" id="card-${p.id}">
        <div class="card-top">
            <span class="status-badge ${statusClass}">${statusLabel}</span>
            <span class="pref-badge">📍 ${escHtml(p.prefecture)}${p.municipality ? ' ' + escHtml(p.municipality) : ''}</span>
            ${p.category ? `<span class="category-badge">${escHtml(p.category)}</span>` : ''}
        </div>
        <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;">
            <h3 style="margin:0;">${escHtml(title)}</h3>
            ${ageGender ? `<span style="font-size:0.82rem;color:#666;white-space:nowrap;">${ageGender}</span>` : ''}
        </div>
        <p class="petition-summary">${escHtml(summary)}</p>
        <div class="card-bottom">
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                ${docBtn}
                ${p.timestamp ? `<span class="card-meta">📅 ${escHtml(p.timestamp)}</span>` : ''}
            </div>
            <button class="like-btn ${isLiked ? 'clicked' : ''}"
                    id="like-${p.id}"
                    onclick="addLike(${p.id})"
                    ${isLiked ? 'disabled' : ''}>
                <span>${likeLabel}</span>
                ${likeCount > 0 ? `<span>${likeCount.toLocaleString()}</span>` : ''}
            </button>
        </div>
        <div class="share-area">
            <a href="https://twitter.com/intent/tweet?text=${shareTitle}&url=${shareUrl}" target="_blank" rel="noopener" class="share-btn">𝕏 シェア</a>
            <a href="https://www.threads.net/intent/post?text=${shareTitle}%20${shareUrl}" target="_blank" rel="noopener" class="share-btn">Threads</a>
            <a href="https://line.me/R/msg/text/?${shareTitle}%20${shareUrl}" target="_blank" rel="noopener" class="share-btn">LINE</a>
        </div>
    </div>`;
}

// =====================================================================
// ユーティリティ
// =====================================================================
function buildTitle(p) {
    const loc = [p.prefecture, p.municipality].filter(Boolean).join(' ');
    const cat = p.category || '行政への追及';
    return `【${loc}】${cat}`;
}

function getStatusClass(status) {
    if (!status) return 'status-default';
    if (status.includes('受付') || status.includes('募集')) return 'status-募集中';
    if (status.includes('準備'))  return 'status-準備中';
    if (status.includes('提出'))  return 'status-提出済';
    if (status.includes('審議'))  return 'status-審議中';
    return 'status-default';
}

function escHtml(str) {
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

// =====================================================================
// いいね（ブラウザ記憶 + GAS経由でスプレッドシートに保存）
// =====================================================================
async function addLike(id) {
    const key = `petition_${id}`;
    if (likedSet.has(key)) return;

    const p = allPetitions.find(x => x.id === id);
    if (!p) return;

    // ブラウザに記録（ページをまたいで二重押し防止）
    likedSet.add(key);
    localStorage.setItem('liked', JSON.stringify([...likedSet]));

    // UI を即時更新
    const btn = document.getElementById(`like-${id}`);
    if (btn) {
        btn.classList.add('clicked');
        btn.disabled = true;
        const newCount = (p.likeCount || 0) + 1;
        btn.innerHTML = `<span>賛同済み ✓</span><span>${newCount.toLocaleString()}</span>`;
    }

    // GAS API に送信してスプレッドシートに保存
    if (GAS_API_URL && GAS_API_URL !== 'YOUR_GAS_DEPLOY_URL_HERE') {
        try {
            // mode:'no-cors' でCORSを回避（レスポンスは読めないが書き込みは実行される）
            await fetch(`${GAS_API_URL}?action=like&rowNum=${p.sheetRowNum}`, {
                method: 'GET',
                mode: 'no-cors'
            });
        } catch (err) {
            console.warn('GAS API エラー（いいね記録）:', err);
        }
    }
}

// =====================================================================
// ページネーション
// =====================================================================
function renderPagination() {
    const totalPages = Math.ceil(filteredData.length / PER_PAGE);
    const pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← 前へ</button>`;
    for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
        } else if (Math.abs(i - currentPage) === 3) {
            html += `<span style="color:#555;padding:8px 4px;">…</span>`;
        }
    }
    html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>次へ →</button>`;
    pg.innerHTML = html;
}

function goPage(page) {
    const totalPages = Math.ceil(filteredData.length / PER_PAGE);
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderPage(page);
    renderPagination();
    window.scrollTo({ top: document.querySelector('.container').offsetTop - 80, behavior: 'smooth' });
}

// =====================================================================
// フィルター操作
// =====================================================================
function setStatusFilter(val, btn) {
    activeFilters.status = val;
    document.querySelectorAll('.filter-row:first-child .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
}
function setPrefFilter(val)      { activeFilters.prefecture = val; applyFilters(); }
function setCategoryFilter(val)  { activeFilters.category   = val; applyFilters(); }
function setKeywordFilter(val)   { activeFilters.keyword    = val; applyFilters(); }

// =====================================================================
// エラー表示
// =====================================================================
function showError(msg) {
    document.getElementById('publish-notice').style.display = 'block';
    document.getElementById('petition-list').innerHTML = `
        <div class="error-state">
            <div class="icon">⚠️</div>
            <h3>データの読み込みに失敗しました</h3>
            <p>Googleスプレッドシートの公開設定を確認してください。</p>
            <div class="error-detail">
                <strong>考えられる原因：</strong><br>
                ・インターネット接続が不安定<br>
                ・スプレッドシートの「ウェブに公開」設定が解除された<br>
                ・Googleのサーバーが一時的に応答していない<br><br>
                <em>エラー内容: ${escHtml(msg)}</em>
            </div>
            <button class="reload-btn" style="margin-top:10px;" onclick="loadData()">🔄 再試行</button>
        </div>`;
}

// ナビゲーション
// =====================================================================
function toggleNav() { document.getElementById('main-nav').classList.toggle('open'); }

// 初回読み込み

loadData();
</script>
